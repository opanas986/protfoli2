<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LuxStore | Case Study</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cursor"></div>
    <div class="bg-glow"></div>
    <div class="case-container fade-in">
        <a href="index.html" style="color: #666; text-decoration: none;">&larr; BACK</a>
        <h1 style="font-size: 3.5rem; margin: 20px 0;">Lux<span style="color: var(--gold);">Store</span></h1>
        <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1200" class="project-img">
        <div class="stats-grid">
            <div class="stat-card" style="border-color: var(--gold);"><h2>$50k+</h2><p>Monthly Rev</p></div>
            <div class="stat-card" style="border-color: var(--gold);"><h2>A+</h2><p>SEO Score</p></div>
            <div class="stat-card" style="border-color: var(--gold);"><h2>Clean</h2><p>Checkout</p></div>
        </div>
        <div class="step-box">
            <h3 style="color: var(--gold);">Outcome</h3>
            <p>Интернет-магазин премиум-класса. Благодаря оптимизации пути пользователя и внедрению быстрой оплаты, доход клиента вырос на 25% за первый месяц.</p>
        </div>
        <div style="text-align: center; margin-top: 50px;">
            <a href="https://www.fiverr.com/s/Q7pZRXP" class="btn-primary" style="background: var(--gold); color: #000;">Build My Store</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
